<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Autocompletado Debug</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #000;
            color: #fff;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .search-container {
            position: relative;
            margin: 20px 0;
        }
        .search-box-modern {
            display: flex;
            border: 2px solid #333;
            border-radius: 50px;
            overflow: hidden;
            background: #000;
            width: 100%;
        }
        .search-box-modern input {
            flex: 1;
            padding: 20px 28px;
            border: none;
            outline: none;
            font-size: 18px;
            background: transparent;
            color: #fff;
        }
        .search-box-modern input::placeholder {
            color: #999;
        }
        .search-box-modern button {
            background: #C0C0C0;
            color: #fff;
            border: none;
            padding: 20px 28px;
            cursor: pointer;
            font-size: 18px;
        }
        .search-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            z-index: 1000;
            max-height: 400px;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 5px;
        }
        .search-suggestions.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .suggestion-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 1px solid #222;
            color: #ccc;
        }
        .suggestion-item:hover,
        .suggestion-item.highlighted {
            background: rgba(192, 192, 192, 0.08);
            color: #fff;
            border-left: 3px solid #C0C0C0;
        }
        .suggestion-image {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            object-fit: cover;
            margin-right: 12px;
            background: #222;
            flex-shrink: 0;
        }
        .suggestion-content {
            flex: 1;
            min-width: 0;
        }
        .suggestion-title {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 2px;
            color: inherit;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .suggestion-category {
            font-size: 12px;
            color: #999;
            text-transform: capitalize;
        }
        .suggestion-price {
            font-weight: 600;
            color: #C0C0C0;
            font-size: 13px;
            margin-left: 8px;
            flex-shrink: 0;
        }
        .debug-info {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: monospace;
            font-size: 12px;
        }
        .debug-info h3 {
            color: #C0C0C0;
            margin-top: 0;
        }
        .status {
            padding: 5px 10px;
            border-radius: 4px;
            margin: 5px 0;
            font-weight: bold;
        }
        .status.success { background: #27ae60; }
        .status.error { background: #e74c3c; }
        .status.warning { background: #f39c12; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔍 Test Autocompletado Debug</h1>
        
        <div class="debug-info">
            <h3>Estados del Sistema:</h3>
            <div id="api-status" class="status warning">Verificando API...</div>
            <div id="autocomplete-status" class="status warning">Verificando Autocompletado...</div>
            <div id="elements-status" class="status warning">Verificando Elementos...</div>
        </div>

        <div class="search-container">
            <div class="search-box-modern">
                <input type="text" id="searchInput" placeholder="Buscar productos para test..." autocomplete="off">
                <button type="button">
                    <i class="fas fa-search">🔍</i>
                </button>
            </div>
            <div id="searchSuggestions" class="search-suggestions"></div>
        </div>

        <div class="debug-info">
            <h3>Log de Eventos:</h3>
            <div id="debug-log"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/supabase-api-client-fixed.js"></script>
    <script src="assets/js/search-autocomplete.js"></script>
    
    <script>
        // Debug logger
        const debugLog = document.getElementById('debug-log');
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.style.color = type === 'error' ? '#e74c3c' : type === 'success' ? '#27ae60' : '#fff';
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            debugLog.appendChild(logEntry);
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(`[DEBUG] ${message}`);
        }

        // Status updaters
        function updateStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.className = `status ${type}`;
            element.textContent = message;
        }

        // Initialize debug
        document.addEventListener('DOMContentLoaded', () => {
            log('🚀 Iniciando debug del autocompletado');
            
            // Check API status
            setTimeout(() => {
                if (window.artesanaAPI) {
                    updateStatus('api-status', '✅ API Disponible', 'success');
                    log('✅ window.artesanaAPI está disponible', 'success');
                    
                    // Test API call
                    testApiCall();
                } else {
                    updateStatus('api-status', '❌ API No Disponible', 'error');
                    log('❌ window.artesanaAPI NO está disponible', 'error');
                }
            }, 1000);
            
            // Check autocomplete status
            setTimeout(() => {
                if (window.searchAutocomplete) {
                    updateStatus('autocomplete-status', '✅ Autocompletado Inicializado', 'success');
                    log('✅ window.searchAutocomplete está disponible', 'success');
                } else {
                    updateStatus('autocomplete-status', '❌ Autocompletado No Inicializado', 'error');
                    log('❌ window.searchAutocomplete NO está disponible', 'error');
                }
            }, 2000);
            
            // Check elements
            const searchInput = document.getElementById('searchInput');
            const searchSuggestions = document.getElementById('searchSuggestions');
            
            if (searchInput && searchSuggestions) {
                updateStatus('elements-status', '✅ Elementos DOM Encontrados', 'success');
                log('✅ Elementos DOM están disponibles', 'success');
            } else {
                updateStatus('elements-status', '❌ Elementos DOM Faltantes', 'error');
                log('❌ Elementos DOM NO están disponibles', 'error');
            }
        });
        
        // Test API call
        async function testApiCall() {
            try {
                log('🔄 Probando llamada a API...');
                const result = await window.artesanaAPI.searchProducts('arte', 5);
                log(`✅ API responde correctamente: ${result.products.length} productos`, 'success');
            } catch (error) {
                log(`❌ Error en API: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
