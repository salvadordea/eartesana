<!-- HEADER UNIVERSAL - ESTUDIO ARTESANA -->
<!-- Este header se adapta automáticamente según la ubicación del archivo -->
<header class="header">
    <div class="container">
        <div class="header-content">
            <!-- Logo -->
            <div class="logo">
                <a href="{{HOMEPAGE_URL}}" id="logoLink">
                    <img src="{{LOGO_URL}}" alt="Estudio Artesana" class="logo-img" id="logoImg">
                </a>
            </div>

            <!-- Navigation -->
            <nav class="nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="{{HOMEPAGE_URL}}" class="nav-link {{HOME_ACTIVE}}">INICIO</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a href="{{TIENDA_URL}}" class="nav-link {{TIENDA_ACTIVE}}">TIENDA</a>
                        <i class="fas fa-chevron-down nav-arrow"></i>
                        <div class="dropdown-menu" id="tiendaDropdown">
                            <a href="{{TIENDA_URL}}" class="dropdown-link">Todos los productos</a>
                            <div class="dropdown-divider"></div>
                            <div class="dropdown-categories" id="dropdownCategories">
                                <!-- Categories will be loaded here dynamically -->
                            </div>
                        </div>
                    </li>
                    <li class="nav-item">
                        <a href="{{SOBRE_NOSOTROS_URL}}" class="nav-link {{SOBRE_ACTIVE}}">SOBRE NOSOTROS</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{MAYORISTAS_URL}}" class="nav-link {{MAYORISTAS_ACTIVE}}">MAYORISTAS</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{CONTACTO_URL}}" class="nav-link {{CONTACTO_ACTIVE}}">CONTACTO</a>
                    </li>
                    <li class="nav-item">
                        <a href="{{REGISTRO_URL}}" class="nav-link {{REGISTRO_ACTIVE}}">REGISTRO DE CLIENTES</a>
                    </li>
                </ul>
            </nav>

            <!-- Header Icons -->
            <div class="header-icons">
                <button class="header-icon cart-btn" title="Ver carrito">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-counter" id="cartCount" style="display: none;">0</span>
                </button>
                <button class="search-toggle header-icon">
                    <i class="fas fa-search"></i>
                </button>
                
                <!-- User Account Icon (shown when authenticated) -->
                <div class="user-account-dropdown" id="userAccountDropdown" style="display: none;">
                    <button class="header-icon user-icon" id="userAccountBtn">
                        <i class="fas fa-user-circle"></i>
                    </button>
                    <div class="user-dropdown-menu" id="userDropdownMenu">
                        <div class="user-info">
                            <span class="user-name" id="headerUserName">Usuario</span>
                            <span class="user-email" id="headerUserEmail">user@example.com</span>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a href="mi-cuenta.html" class="dropdown-link">
                            <i class="fas fa-user-cog"></i> Mi Cuenta
                        </a>
                        <a href="#" class="dropdown-link" onclick="handleLogout()">
                            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                        </a>
                    </div>
                </div>
                
                <!-- Login Button (shown when not authenticated) -->
                <a href="auth.html" class="header-icon login-btn" id="loginBtn" title="Iniciar Sesión">
                    <i class="fas fa-sign-in-alt"></i>
                </a>
            </div>

            <!-- Mobile Menu Button -->
            <button class="mobile-menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </div>
</header>
